<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPS Database</title>
  
  <!-- Web App Manifest (Crucial for iOS "Open as Web App" mode) -->
  <link rel="manifest" href="site.webmanifest">

  <!-- Apple Specific Touch Icons -->
  <link rel="apple-touch-icon" href="https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/apple-touch-icon.png">
  
  <!-- iOS Safari Web App Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SPS Database">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #F5F2EC;
      color: #1C1A17;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      background: #FDFBF7;
      padding: 32px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 320px;
      width: 100%;
      box-sizing: border-box;
    }
    img {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 16px;
      object-fit: cover;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
    }
    p {
      font-size: 14px;
      color: #6B6456;
      margin: 0 0 24px 0;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 0;
      background-color: #1A2744;
      color: #F5F2EC;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(26,39,68,0.2);
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/apple-touch-icon.png" alt="SPS Logo">
    <h1>SPS Database</h1>
    <p>Tap below to launch the web application.</p>
    <!-- REPLACE WITH YOUR GOOGLE APPS SCRIPT EXEC URL -->
    <a class="btn" href="YOUR_APPS_SCRIPT_EXEC_URL_HERE">Open Database</a>
  </div>

</body>
</html>
